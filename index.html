  if(!p) return "—";
  const n=p.replace(/\D/g,"");
  if(n.length===11) return `${n.slice(0,3)}-${n.slice(3,7)}-${n.slice(7)}`;
  if(n.length===10){
    if(n.startsWith("02")) return `${n.slice(0,2)}-${n.slice(2,6)}-${n.slice(6)}`;

};

function resolveColor(item) {
  const barcode = (item.barcode || "").toUpperCase();
  const m = barcode.match(/-([A-Z0-9]+)$/);
  const suffix = m ? m[1] : barcode;
  if (suffix === "WH")  return "화이트";
  if (suffix === "OA")  return "오크";
  if (suffix === "BK")  return "블랙";
  if (suffix === "XX" || suffix === "SUS") return "";
  return item.color || "";
}

function downloadCSV(content, filename) {
  const blob = new Blob(["\uFEFF"+content], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

// Code 128B 인코딩 (심볼 배열 + 체크 디짓 반환)
function c128enc(str){
  const syms=[];
  for(let i=0;i<str.length;i++){const v=str.charCodeAt(i)-32;if(v>=0&&v<=95)syms.push(v);}
  let chk=104;
  for(let i=0;i<syms.length;i++)chk+=(i+1)*syms[i];
  return{syms,chk:chk%103};
}

// React SVG 바코드 컴포넌트 (Code 128B)
function Barcode({value="SAMPLE",h=50,showText=true}){
  const{syms,chk}=c128enc(value);
  const MW=2,bars=[];let x=4;
  const draw=(p,k)=>{let bar=true;p.forEach((w,j)=>{const pw=w*MW;if(bar)bars.push(<rect key={`${k}_${j}`} x={x} y={2} width={pw} height={h-(showText?14:4)} fill="#111"/>);x+=pw;bar=!bar;});};
  draw(C128_SP,'s');syms.forEach((s,i)=>draw(C128T[s],i));draw(C128T[chk],'c');draw(C128_ST,'e');
  const tw=x+4;
  return(
    <svg width={tw} height={h} style={{background:"#fff",display:"block",borderRadius:2}}>
      <rect width={tw} height={h} fill="#fff"/>
      {bars}
      {showText&&<text x={tw/2} y={h-3} textAnchor="middle" fontSize="7" fontFamily="monospace" fill="#333">{value}</text>}
    </svg>
  );
}

// 바코드 즉시 인쇄 (새 창)
function printBarcode(value,label){
  const{syms,chk}=c128enc(value);
  const MW=2,BH=70;let x=10,rcts='';
  const draw=p=>{let bar=true;p.forEach(w=>{const pw=w*MW;if(bar)rcts+=`<rect x="${x}" y="2" width="${pw}" height="${BH}" fill="#000"/>`;x+=pw;bar=!bar;});};
  draw(C128_SP);syms.forEach(s=>draw(C128T[s]));draw(C128T[chk]);draw(C128_ST);
  const W=x+10;
  const svg=`<svg width="${W}" height="${BH+22}" xmlns="http://www.w3.org/2000/svg"><rect width="${W}" height="${BH+22}" fill="white"/>${rcts}<text x="${W/2}" y="${BH+16}" text-anchor="middle" font-size="10" font-family="monospace" fill="#333">${value}</text></svg>`;
  const pw=window.open('','_blank','width=460,height=280');
  pw.document.write(`<!DOCTYPE html><html><head><title>바코드 인쇄</title><style>body{margin:24px;text-align:center;font-family:sans-serif;background:#fff;}h3{font-size:15px;margin-bottom:14px;color:#111;}p{font-size:11px;color:#666;margin-top:6px;}</style></head><body><h3>${label||value}</h3>${svg}<p>Code 128B — ${value}</p></body></html>`);
  pw.document.close();setTimeout(()=>pw.print(),500);
}

// ── StatusCell ─────────────────────────────────────────────────────────────
function StatusCell({ delivery, updateDelivery }) {
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!open) return;
    const close=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",close);
    return()=>document.removeEventListener("mousedown",close);
  },[open]);
  const OPTIONS=[
    {key:"pending",    label:"대기중", emoji:"🕐", color:C.accent},
    {key:"inprogress", label:"배송중", emoji:"🚚", color:C.blue},
    {key:"completed",  label:"완료",   emoji:"✅", color:C.green},
  ];
  const cur=OPTIONS.find(o=>o.key===delivery.status)||OPTIONS[0];
  return (
    <div ref={ref} style={{position:"relative",display:"inline-block"}}>
      <button onClick={()=>setOpen(p=>!p)} style={{background:cur.color+"22",color:cur.color,padding:"6px 12px 6px 10px",borderRadius:20,fontSize:"0.85em",fontWeight:700,border:`1px solid ${cur.color}55`,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
        <span>{cur.emoji}</span>{cur.label}<IcChevD s={11}/>

        <div style={{textAlign:"center"}}><div style={{color:"rgba(255,255,255,0.45)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>고객</div><div style={{color:"#fff",fontWeight:800,fontSize:17}}>{delivery.customerName}</div></div>
        <div style={{width:1,height:36,background:"rgba(255,255,255,0.15)"}}/>
        <div style={{textAlign:"center"}}><div style={{color:"rgba(255,255,255,0.45)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>배송일</div><div style={{color:C.accent2,fontWeight:700,fontSize:15}}>{delivery.deliveryDate}</div></div>
        {delivery.color&&<><div style={{width:1,height:36,background:"rgba(255,255,255,0.15)"}}/>
        <div style={{textAlign:"center"}}><div style={{color:"rgba(255,255,255,0.45)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>색상</div><div style={{color:"#c4b5fd",fontWeight:700,fontSize:15}}>{delivery.color}</div></div></>}
        <div style={{width:1,height:36,background:"rgba(255,255,255,0.15)"}}/>
        <div style={{textAlign:"center",maxWidth:260}}><div style={{color:"rgba(255,255,255,0.45)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>품목</div><div style={{color:"rgba(255,255,255,0.85)",fontSize:13}}>{delivery.items||"—"}</div></div>
      </div>
      <div style={{color:"rgba(255,255,255,0.25)",fontSize:11}}>클릭하거나 ESC를 눌러 닫기</div>
    </div>
  );
}

// ── CalendarSidebar ────────────────────────────────────────────────────────
function CalendarSidebar({ selectedDate, onSelect, deliveries }) {
  const [view,setView]=useState(new Date());
  const y=view.getFullYear(),mo=view.getMonth();
  const firstDay=new Date(y,mo,1).getDay();
  const totalDays=new Date(y,mo+1,0).getDate();
  const DAY=["일","월","화","수","목","금","토"];
  const cells=[...Array(firstDay).fill(null),...Array.from({length:totalDays},(_,i)=>i+1)];
  const fmt=d=>`${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const thisMonth=`${y}-${String(mo+1).padStart(2,"0")}`;

  // 날짜별 건수 맵
  const dateCounts={};
  deliveries.forEach(d=>{ dateCounts[d.deliveryDate]=(dateCounts[d.deliveryDate]||0)+1; });

  const isMonthSel=selectedDate===thisMonth;
  const isDateSel=selectedDate&&selectedDate.length>7;
  const filterStr=selectedDate||thisMonth;

  // 하단 패널 정보
  const panelDeliveries=deliveries.filter(d=>isDateSel?d.deliveryDate===selectedDate:d.deliveryDate.startsWith(thisMonth));
  const panelCount=panelDeliveries.length;
  const panelLabel=isDateSel?`${parseInt(selectedDate.split('-')[1])}월 ${parseInt(selectedDate.split('-')[2])}일`:`${mo+1}월 전체`;

  const SC=s=>s==="completed"?C.green:s==="inprogress"?C.blue:C.accent;
  const SL=s=>s==="completed"?"완료":s==="inprogress"?"배송중":"대기";
  return (
    <div style={{width:228,flexShrink:0,background:C.card,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:12}}>
      {/* 월 이동 + 월 클릭 선택 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <button onClick={()=>setView(new Date(y,mo-1,1))} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:4,display:"flex"}}><IcLeft s={15}/></button>
        <button onClick={()=>onSelect(isMonthSel?null:thisMonth)}
          style={{background:isMonthSel?C.accent+"22":"none",border:isMonthSel?`1px solid ${C.accent}55`:"1px solid transparent",borderRadius:6,padding:"3px 8px",color:isMonthSel?C.accent:C.text,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
          {y}년 {mo+1}월
        </button>
        <button onClick={()=>setView(new Date(y,mo+1,1))} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:4,display:"flex"}}><IcRight s={15}/></button>
      </div>
      {/* 날짜 그리드 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
        {DAY.map((l,i)=><div key={l} style={{textAlign:"center",fontSize:10,color:i===0?"#f87171":i===6?"#93c5fd":C.muted,padding:"2px 0"}}>{l}</div>)}
        {cells.map((d,i)=>{
          if(!d) return <div key={`e${i}`}/>;
          const ds=fmt(d),cnt=dateCounts[ds]||0,isSel=selectedDate===ds,dow=(firstDay+d-1)%7;
          return (
            <button key={d} onClick={()=>onSelect(isSel?null:ds)}
              style={{background:isSel?C.accent:cnt>0?C.border:"transparent",border:`2px solid ${isSel?C.accent:cnt>0?C.accent+"55":"transparent"}`,borderRadius:5,color:isSel?"#000":dow===0?"#f87171":dow===6?"#93c5fd":C.text,cursor:"pointer",fontSize:11,padding:"3px 0",position:"relative",fontWeight:cnt>0?700:400,lineHeight:"1.4",minHeight:26}}>
              {d}
              {cnt>0&&<span style={{position:"absolute",bottom:1,left:"50%",transform:"translateX(-50%)",fontSize:7,fontWeight:800,color:isSel?"#000":C.accent,lineHeight:1}}>{cnt}</span>}
            </button>
          );
        })}
      </div>
      <button onClick={()=>onSelect(null)} style={{background:C.border2,color:C.muted2,border:"none",borderRadius:5,padding:"5px 0",cursor:"pointer",fontSize:11,marginBottom:12}}>전체 보기</button>
      {/* 하단 정보 패널 — 선택에 따라 동적 변경 */}
      <div style={{background:C.bg,borderRadius:10,padding:14,flex:1}}>
        <div style={{color:C.muted,fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>{panelLabel}</div>
        <div style={{color:C.accent,fontSize:28,fontWeight:800,lineHeight:1,marginBottom:10}}>
          {panelCount}<span style={{color:C.muted,fontSize:12,fontWeight:400}}> 건</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {["pending","inprogress","completed"].map(s=>{
            const cnt=panelDeliveries.filter(d=>d.status===s).length;
            return cnt>0?(
              <div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted2}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:SC(s),display:"inline-block"}}/>{SL(s)}
                </span>
                <span style={{color:SC(s),fontWeight:700,fontSize:12}}>{cnt}</span>
              </div>
            ):null;
          })}
        </div>
        {panelCount===0&&<div style={{color:C.muted,fontSize:11,marginTop:6}}>배송 없음</div>}
      </div>
    </div>
  );
}

// ── DeliveryModal ──────────────────────────────────────────────────────────
function DeliveryModal({ onClose, onSave, init }) {
  const {items:allItems, sets:allSets, stores:allStores} = useContext(AppCtx);
  const blank={deliveryDate:today(),store:"",deliveryType:"신규",customerName:"",phone:"",address:"",notes:"",rowColor:"#1e293b",status:"pending",productImage:null};
  const [f,setF]=useState(init||blank);
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));

  // 구입처 — 직접입력 모드
  const [storeManual,setStoreManual]=useState(()=>init?.store&&!allStores.find(s=>s.name===init?.store));
  const [storeInput,setStoreInput]=useState(init?.store||"");

  // 품목 피커 / 텍스트 토글
  const [itemsMode,setItemsMode]=useState('picker'); // 'picker' | 'text'
  const [itemsText,setItemsText]=useState(()=>init?.items||"");
  const [pickedItems,setPickedItems]=useState(()=>init?.itemsList||[]);
  const [pickSearch,setPickSearch]=useState("");
  const pickable=[
    ...allSets.map(st=>({id:st.id,name:st.name,barcode:st.barcode,type:'set',stock:9999})),
    ...allItems.map(it=>({id:it.id,name:it.name,barcode:it.barcode,color:resolveColor(it),type:'item',stock:it.stock})),
  ];
  const filteredPickable=pickable.filter(it=>{
    if(!pickSearch) return true;
    const q=pickSearch.toLowerCase();
    return it.name.toLowerCase().includes(q)||(it.barcode||"").toLowerCase().includes(q);
  });
  const addToPick=item=>{
    const ex=pickedItems.findIndex(p=>p.id===item.id);
    if(ex>=0) setPickedItems(p=>p.map((pi,i)=>i===ex?{...pi,qty:pi.qty+1}:pi));
    else {
      const fullSet=item.type==='set'?allSets.find(s=>s.id===item.id):null;
      setPickedItems(p=>[...p,{id:item.id,name:item.name,barcode:item.barcode,type:item.type,qty:1,components:fullSet?.components||[]}]);
    }
  };
  const changePickQty=(idx,delta)=>setPickedItems(p=>p.map((pi,i)=>i===idx?{...pi,qty:Math.max(1,pi.qty+delta)}:pi));

  // 선택된 품목에서 색상 자동 감지 (WH→화이트, OA→오크, BK→블랙)
  const autoColors=[...new Set(pickedItems.flatMap(p=>{
    if(p.type==='set') return (p.components||[]).map(c=>resolveColor({barcode:c.barcode||'',color:c.color||''})).filter(Boolean);
    return [resolveColor({barcode:p.barcode||'',color:p.color||''})].filter(Boolean);
  }))];

  const imgRef=useRef();
  const [dragOver,setDragOver]=useState(false);
  const ROW_COLORS=["#1e293b","#0d2744","#0d2a1a","#2a1010","#1a1030","#2a2010"];
  const IS={width:"100%",background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,color:C.text,padding:"8px 10px",fontSize:13,boxSizing:"border-box",outline:"none"};
  const LS={color:C.muted2,fontSize:11,display:"block",marginBottom:4};
  const BS={width:24,height:24,borderRadius:4,background:C.border2,color:C.text,border:"none",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700};

  const processImage=file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1200,scale=Math.min(MAX/img.width,MAX/img.height,1);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        sv("productImage",canvas.toDataURL("image/jpeg",0.88));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const handleImage=e=>{const file=e.target.files[0];if(!file)return;processImage(file);e.target.value="";};

  const handleSave=()=>{
    if(!f.customerName||!f.deliveryDate) return;
    const storeName=storeManual?storeInput:f.store;
    const itemsStr=itemsMode==='text'?itemsText:pickedItems.map(p=>{
      if(p.type==='set'&&p.components&&p.components.length>0){
        const comps=p.components.map(c=>{
          const col=resolveColor({barcode:c.barcode||'',color:c.color||''});
          return `${c.name}${col?' ('+col+')':''} ${(c.qty||1)*(p.qty||1)}개`;
        }).join(', ');
        return `[${p.name}] ${comps}`;
      }
      return `${p.name} ${p.qty}개`;
    }).join(' | ');
    const colorToSave=f.color||(autoColors.length>0?autoColors.join(', '):'');
    const itemsList=itemsMode==='picker'?pickedItems:[];
    onSave({...f,store:storeName,items:itemsStr,itemsList,color:colorToSave});
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:C.card2,borderRadius:14,width:640,maxHeight:"92vh",overflow:"auto",border:`1px solid ${C.border2}`}}>
        <div style={{padding:"18px 22px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.card2,zIndex:1}}>
          <h2 style={{color:C.text,fontSize:16,fontWeight:700,margin:0}}>{init?"✏️ 배송 수정":"📦 배송 일정 추가"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer"}}><IcX s={18}/></button>
        </div>
        <div style={{padding:22,display:"grid",gap:13}}>

          {/* 배송일 + 배송유형 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><label style={LS}>배송일 *</label><input type="date" value={f.deliveryDate} onChange={e=>sv("deliveryDate",e.target.value)} style={IS}/></div>
            <div>
              <label style={LS}>배송정보</label>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {DELIVERY_TYPES.map(dt=>(
                  <button key={dt.key} onClick={()=>sv("deliveryType",dt.key)}
                    style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:`2px solid ${f.deliveryType===dt.key?dt.color:C.border2}`,background:f.deliveryType===dt.key?dt.bg:"transparent",color:f.deliveryType===dt.key?dt.color:C.muted,transition:"all 0.15s",fontFamily:"inherit"}}>
                    {dt.key}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* 구입처 */}
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <label style={{...LS,marginBottom:0}}>구입처</label>
              <button onClick={()=>setStoreManual(p=>!p)} style={{background:"none",border:"none",color:C.blue,cursor:"pointer",fontSize:11}}>
                {storeManual?"목록에서 선택":"직접 입력"}
              </button>
            </div>
            {storeManual?(
              <input type="text" value={storeInput} onChange={e=>setStoreInput(e.target.value)} placeholder="구입처 직접 입력" style={IS}/>
            ):(
              <select value={f.store} onChange={e=>sv("store",e.target.value)} style={IS}>
                <option value="">-- 구입처 선택 --</option>
                {allStores.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
              </select>
            )}
          </div>

          {/* 고객명 + 연락처 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><label style={LS}>고객명 *</label><input type="text" value={f.customerName} onChange={e=>sv("customerName",e.target.value)} placeholder="홍길동" style={IS}/></div>
            <div><label style={LS}>연락처</label><input type="text" value={f.phone} onChange={e=>sv("phone",e.target.value)} placeholder="010-0000-0000" style={IS}/></div>
          </div>

          {/* 주소 */}
          <div><label style={LS}>주소</label><input type="text" value={f.address} onChange={e=>sv("address",e.target.value)} placeholder="배송지 주소" style={IS}/></div>

          {/* 상태 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr",gap:12}}>
            <div><label style={LS}>상태</label>
              <select value={f.status} onChange={e=>sv("status",e.target.value)} style={IS}>
                <option value="pending">대기중</option><option value="inprogress">배송중</option><option value="completed">완료</option>
              </select>
            </div>
          </div>

          {/* ── 주문 품목 ── */}
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <label style={{...LS,marginBottom:0}}>주문 품목</label>
              <button onClick={()=>setItemsMode(m=>m==='picker'?'text':'picker')}
                style={{background:C.border2,border:"none",color:C.muted2,padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                {itemsMode==='picker'?'📝 텍스트로 입력':'📦 품목 피커로 선택'}
              </button>
            </div>

            {itemsMode==='text'?(
              <textarea value={itemsText} onChange={e=>setItemsText(e.target.value)}
                placeholder="소파 3인용 ×1, 쿠션 ×4 (직접 입력)" rows={3}
                style={{...IS,resize:"vertical"}}/>
            ):(
              <>
                {pickedItems.length>0&&(
                  <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
                    {pickedItems.map((p,idx)=>(
                      <div key={idx} style={{display:"flex",alignItems:"center",gap:8,background:C.bg,border:`1px solid ${C.border2}`,padding:"7px 10px",borderRadius:7}}>
                        <span style={{fontSize:14}}>{p.type==='set'?'🧩':'📦'}</span>
                        <span style={{flex:1,color:C.text,fontWeight:600,fontSize:13}}>{p.name}</span>
                        {p.barcode&&<span style={{color:"#93c5fd",fontSize:10,fontFamily:"monospace"}}>{p.barcode}</span>}
                        <button style={BS} onClick={()=>changePickQty(idx,-1)}>−</button>
                        <span style={{color:C.accent,fontWeight:800,fontSize:14,minWidth:22,textAlign:"center"}}>×{p.qty}</span>
                        <button style={BS} onClick={()=>changePickQty(idx,+1)}>+</button>
                        <button onClick={()=>setPickedItems(p=>p.filter((_,i)=>i!==idx))} style={{background:"none",border:"none",color:C.red,cursor:"pointer",display:"flex",padding:2}}><IcX s={13}/></button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{border:`1px solid ${C.border2}`,borderRadius:8,overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",background:C.bg,borderBottom:`1px solid ${C.border}`}}>
                    <span style={{display:"flex",color:C.muted,flexShrink:0}}><IcSearch s={12}/></span>
                    <input value={pickSearch} onChange={e=>setPickSearch(e.target.value)} placeholder="바코드 또는 품목명 입력…" style={{background:"none",border:"none",color:C.text,fontSize:12,outline:"none",flex:1}}/>
                  </div>
                  <div style={{maxHeight:160,overflowY:"auto"}}>
                    {filteredPickable.length===0&&<div style={{padding:14,textAlign:"center",color:C.muted,fontSize:12}}>품목 또는 세트를 먼저 등록하세요</div>}
                    {filteredPickable.map(item=>{
                      const already=pickedItems.find(p=>p.id===item.id);
                      return (
                        <button key={item.id} onClick={()=>addToPick(item)}
                          style={{display:"flex",alignItems:"center",width:"100%",textAlign:"left",padding:"8px 12px",background:already?C.border+"44":"transparent",border:"none",borderBottom:`1px solid ${C.border}22`,cursor:"pointer",gap:8,fontFamily:"inherit"}}
                          onMouseEnter={e=>e.currentTarget.style.background=C.border2}
                          onMouseLeave={e=>e.currentTarget.style.background=already?C.border+"44":"transparent"}>
                          <span style={{fontSize:13}}>{item.type==='set'?'🧩':'📦'}</span>
                          <span style={{flex:1,color:C.text,fontWeight:600,fontSize:13}}>{item.name}</span>
                          <span style={{color:"#93c5fd",fontSize:10,fontFamily:"monospace"}}>{item.barcode}</span>
                          {item.stock<9999&&<span style={{color:item.stock>0?C.green:C.red,fontSize:11,fontWeight:700,minWidth:40,textAlign:"right"}}>재고 {item.stock}</span>}
                          {already?<span style={{color:C.accent,fontSize:11,fontWeight:700,minWidth:30,textAlign:"right"}}>×{already.qty}</span>:<span style={{display:"flex",color:C.green,flexShrink:0}}><IcPlus s={12}/></span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </>
            )}
          </div>

          <div><label style={LS}>기타 메모</label><textarea value={f.notes} onChange={e=>sv("notes",e.target.value)} placeholder="특이사항" rows={2} style={{...IS,resize:"vertical"}}/></div>

          {/* 색상 */}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <label style={{...LS,marginBottom:0}}>색상</label>
              {autoColors.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {autoColors.map(c=><span key={c} style={{background:C.border2,color:C.accent2,padding:"2px 8px",borderRadius:12,fontSize:10,fontWeight:700}}>🎨 {c} 자동감지</span>)}
              </div>}
            </div>
            <input type="text" value={f.color} onChange={e=>sv("color",e.target.value)}
              placeholder={autoColors.length>0?autoColors.join(', '):"색상 직접 입력 (예: 화이트, 오크)"}
              style={IS}/>
          </div>

          {/* 사진 업로드 + 드래그앤드롭 */}
          <div>
            <label style={LS}>제품 사진</label>
            <input ref={imgRef} type="file" accept="image/*" onChange={handleImage} style={{display:"none"}}/>
            {f.productImage?(
              <div style={{position:"relative",display:"inline-block"}}>
                <img src={f.productImage} alt="제품" style={{width:160,height:160,objectFit:"cover",borderRadius:8,border:`2px solid ${C.border2}`,display:"block"}}/>
                <button onClick={()=>sv("productImage",null)} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcX s={12}/></button>

        <div style={{padding:"14px 22px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end",position:"sticky",bottom:0,background:C.card2}}>

    </div>
  );
}

// ── TimePickerCell ─────────────────────────────────────────────────────────
function TimePickerCell({ currentTime, onSave }) {
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!open) return;
    const close=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",close);
    return()=>document.removeEventListener("mousedown",close);
  },[open]);
  // 08:00 ~ 24:00, 30분 단위
  const slots=[];
  for(let h=8;h<=24;h++){
    slots.push(`${String(h).padStart(2,"0")}:00`);
    if(h<24) slots.push(`${String(h).padStart(2,"0")}:30`);
  }
  return (
    <div ref={ref} style={{position:"relative",alignSelf:"center",flexShrink:0}}>
      <button onClick={()=>setOpen(p=>!p)}
        style={{display:"flex",alignItems:"center",gap:6,background:C.bg,border:`1px solid ${currentTime?C.border2:C.border}`,borderRadius:8,padding:"5px 10px",cursor:"pointer",color:currentTime?C.text:C.muted,fontFamily:"inherit"}}>
        <span style={{fontSize:"1em"}}>🕐</span>
        <span style={{fontFamily:"monospace",fontSize:"0.92em",fontWeight:currentTime?700:400,letterSpacing:"0.05em"}}>
          {currentTime||"--:--"}
        </span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,background:C.card2,border:`1px solid ${C.border2}`,borderRadius:10,padding:4,zIndex:200,maxHeight:220,overflowY:"auto",minWidth:90,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
          <button onClick={()=>{onSave("");setOpen(false);}}
            style={{width:"100%",textAlign:"center",padding:"6px 12px",background:!currentTime?C.border+"88":"transparent",color:C.muted,border:"none",borderRadius:6,cursor:"pointer",fontSize:"0.85em",fontFamily:"monospace",display:"block"}}>
            --:--
          </button>
          {slots.map(slot=>(
            <button key={slot} onClick={()=>{onSave(slot);setOpen(false);}}
              style={{width:"100%",textAlign:"center",padding:"7px 14px",background:currentTime===slot?C.accent+"33":"transparent",color:currentTime===slot?C.accent:C.text,border:"none",borderRadius:6,cursor:"pointer",fontSize:"0.92em",fontFamily:"monospace",fontWeight:currentTime===slot?800:400,display:"block"}}
              onMouseEnter={e=>e.currentTarget.style.background=currentTime===slot?C.accent+"44":C.border2}
              onMouseLeave={e=>e.currentTarget.style.background=currentTime===slot?C.accent+"33":"transparent"}>
              {slot}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function DeliveryPage() {
  const {deliveries,addDelivery,updateDelivery,bulkDeleteDeliveries,reorderDeliveries,delLoading,fontSize}=useContext(AppCtx);
  const [selDate,setSelDate]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [editDel,setEditDel]=useState(null);
  const [printDel,setPrintDel]=useState(null);
  const [checked,setChecked]=useState(new Set());
  const [search,setSearch]=useState("");
  const [previewImg,setPreviewImg]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const dragFrom=useRef(null),dragTo=useRef(null);

  // 날짜 포맷: 2026-04-17 → 4월 17일
  const fmtDate=d=>{
    if(!d) return '—';
    const p=d.split('-');
    return `${parseInt(p[1])}월 ${parseInt(p[2])}일`;
  };

  const base=selDate?deliveries.filter(d=>d.deliveryDate.startsWith(selDate)):deliveries;
  const list=search?base.filter(d=>(d.customerName||'').includes(search)||(d.address||'').includes(search)||(d.store||'').includes(search)||(d.items||'').includes(search)):base;

  const save=async form=>{
    setShowAdd(false);setEditDel(null);
    try{ if(editDel) await updateDelivery(editDel.id,form); else await addDelivery(form); }catch(e){}
  };
  const bulkDelete=async()=>{await bulkDeleteDeliveries(checked);setChecked(new Set());};
  const toggle=id=>setChecked(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll=()=>setChecked(checked.size===list.length&&list.length>0?new Set():new Set(list.map(d=>d.id)));
  const onDragStart=(e,id)=>{dragFrom.current=id;e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,id)=>{e.preventDefault();dragTo.current=id;};
  const onDrop=async e=>{
    e.preventDefault();
    if(!dragFrom.current||dragFrom.current===dragTo.current) return;
    const arr=[...deliveries];
    const fi=arr.findIndex(d=>d.id===dragFrom.current),ti=arr.findIndex(d=>d.id===dragTo.current);
    const [moved]=arr.splice(fi,1);arr.splice(ti,0,moved);
    await reorderDeliveries(arr);
    dragFrom.current=null;dragTo.current=null;
  };

  const TH={padding:"10px 12px",textAlign:"left",color:C.muted,fontSize:"0.77em",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap",background:C.bg,position:"sticky",top:0};
  const TD={padding:"12px 12px",color:C.text,verticalAlign:"middle"};

  // 품목 렌더링
  const renderItems=d=>{
    const il=d.itemsList;
    if(!il||il.length===0) return <span style={{whiteSpace:"pre-wrap",wordBreak:"break-word",color:C.muted2}}>{d.items||"—"}</span>;
    return (
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {il.map((p,idx)=>(
          <div key={idx} style={{display:"flex",flexDirection:"column",gap:2}}>
            {p.type==='set'?(
              <>
                <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  <span style={{flexShrink:0}}>🧩</span>
                  <span style={{fontWeight:800,color:C.accent2}}>{p.name}</span>
                  <span style={{color:C.muted,fontSize:"0.85em"}}>{p.qty}세트</span>
                </div>
                {(p.components||[]).map((c,ci)=>{
                  const col=resolveColor({barcode:c.barcode||'',color:c.color||''});
                  return (
                    <div key={ci} style={{display:"flex",alignItems:"center",gap:3,paddingLeft:20,flexWrap:"wrap"}}>
                      <span style={{flexShrink:0,fontSize:"0.85em"}}>📦</span>
                      <span style={{color:C.text}}>{c.name}</span>
                      <span style={{color:C.accent,fontWeight:700,fontSize:"0.92em"}}>{(c.qty||1)*(p.qty||1)}개</span>
                      {col&&<span style={{color:C.muted2,fontSize:"0.85em"}}>({col})</span>}
                    </div>
                  );
                })}
              </>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:3,flexWrap:"wrap"}}>
                <span style={{flexShrink:0,fontSize:"0.85em"}}>📦</span>
                <span style={{color:C.text}}>{p.name}</span>
                <span style={{color:C.accent,fontWeight:700,fontSize:"0.92em"}}>{p.qty}개</span>
              </div>
            )}
          </div>
        ))}
      </div>
    );
  };

          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            {/* 사이드바 토글 */}
            <button onClick={()=>setSidebarOpen(p=>!p)} title={sidebarOpen?"달력 숨기기":"달력 보기"}
              style={{width:30,height:30,background:sidebarOpen?C.accent+"22":C.border2,border:`1px solid ${sidebarOpen?C.accent+"55":C.border2}`,borderRadius:6,color:sidebarOpen?C.accent:C.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"1em"}}>
              {sidebarOpen?"◀":"▶"}
            </button>
            <span style={{color:C.muted2,whiteSpace:"nowrap"}}>{selDate?`📅 ${fmtDate(selDate)}`:"📋 전체"} <span style={{color:C.accent,fontWeight:700}}>{list.length}건</span></span>
            <div style={{position:"relative",maxWidth:220,flex:1}}>
              <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:C.muted,pointerEvents:"none",display:"flex"}}><IcSearch s={13}/></span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{width:"100%",background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,color:C.text,padding:"6px 8px 6px 26px",fontSize:"0.92em",outline:"none",boxSizing:"border-box"}}/>
            </div>
            {checked.size>0&&<button onClick={bulkDelete} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 11px",background:"#3a1010",color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}><IcTrash s={13}/> {checked.size}개 삭제</button>}
          </div>
          <button onClick={()=>{setEditDel(null);setShowAdd(true);}} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:C.accent,color:"#000",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}><IcPlus s={15}/> 일정 추가</button>

                                    onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){updateDelivery(d.id,{color:e.target.value.trim()});e.target.blur();}}}
                                    style={{width:"5em",background:"transparent",border:`1px solid ${C.border2}`,borderRadius:4,color:C.muted2,padding:"3px 6px",fontSize:"0.85em",outline:"none",fontFamily:"inherit"}}/>
                                );
                                const lo=col.toLowerCase();
                                const isW=lo.includes("화이트")||lo.includes("white");
                                const isB=lo.includes("블랙")||lo.includes("black");
                                const isO=lo.includes("오크")||lo.includes("oak");
                                const bg=isW?"#ffffff":isB?"#111111":isO?"#7a5214":C.border;
                                const fg=isW?"#111111":"#ffffff";
                                const brd=isW?"1px solid #bbb":isB?"1px solid #333":"none";
                                return <span style={{background:bg,color:fg,padding:"5px 14px",borderRadius:6,fontSize:"0.85em",whiteSpace:"nowrap",display:"inline-block",border:brd,fontWeight:700,letterSpacing:"0.03em"}}>{col}</span>;
                              })()}
                            </div>
                            {/* 기타 — 색상 바로 옆, 중앙 정렬 */}
                            {d.notes&&(
                              <span style={{color:C.muted2,fontSize:"0.85em",flexShrink:1,alignSelf:"center",maxWidth:220,wordBreak:"break-word",lineHeight:1.5}}>📝 {d.notes}</span>
                            )}
                          </div>
                        </td>
                      </tr>
                    </React.Fragment>
                  );
                })}
                {list.length===0&&!delLoading&&<tr><td colSpan={11} style={{textAlign:"center",padding:56,color:C.muted}}>{search?"검색 결과가 없습니다.":"배송 일정이 없습니다. '일정 추가' 버튼을 눌러 등록하세요."}</td></tr>}
              </tbody>
            </table>
          )}
        </div>
      </div>
      {showAdd&&<DeliveryModal onClose={()=>{setShowAdd(false);setEditDel(null);}} onSave={save} init={editDel}/>}
      {printDel&&<PrintLabelModal d={printDel} onClose={()=>setPrintDel(null)}/>}
      {previewImg&&<ImagePreviewModal delivery={previewImg} onClose={()=>setPreviewImg(null)}/>}
    </div>
  );
}

// ── ItemsPage ──────────────────────────────────────────────────────────────
function ItemsPage() {

  const saveItem=async()=>{
    if(!iForm.name) return;
    const data={...iForm};
    setShowItemModal(false);setEditItem(null);setIForm({name:"",color:"",barcode:"",stock:0});
    try{
      if(editItem) await updateItem(editItem.id,data); else await addItem(data);
    }catch(e){}
  };
  const saveSet=async()=>{
    if(!sForm.name) return;
    const data={...sForm};
    setShowSetModal(false);setEditSet(null);
    setSForm({name:"",barcode:"",notes:"",components:[]});setCompSearch("");
    try{
      if(editSet) await updateSet(editSet.id,data); else await addSet(data);
    }catch(e){}
  };
  const addComp=item=>{
    const ex=sForm.components.findIndex(c=>c.itemId===item.id);
    if(ex>=0) setSForm(p=>({...p,components:p.components.map((c,i)=>i===ex?{...c,qty:c.qty+1}:c)}));
    else setSForm(p=>({...p,components:[...p.components,{itemId:item.id,name:item.name,color:item.color,barcode:item.barcode,qty:1}]}));
  };
  const changeQty=(ci,delta)=>setSForm(p=>({...p,components:p.components.map((c,i)=>i===ci?{...c,qty:Math.max(1,c.qty+delta)}:c)}));
  const handleCSV=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      for(const row of ev.target.result.split("\n").slice(1).filter(r=>r.trim())){
        const [n,c,b,s]=row.split(",").map(x=>x.trim().replace(/"/g,""));
        if(n) await addItem({name:n,color:c||"",barcode:b||"",stock:parseInt(s)||0});
      }
    };
    r.readAsText(file);e.target.value="";
  };
  const handleSetCSV=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      for(const row of ev.target.result.split("\n").slice(1).filter(r=>r.trim())){
        const [n,b,note,comps]=row.split(",").map(x=>x.trim().replace(/"/g,""));
        const components=(comps||"").split(";").filter(Boolean).map(cp=>{const[nm,cl,qt]=cp.split(":");return{name:nm||"",color:cl||"",qty:parseInt(qt)||1};});

                <div><label style={{color:C.muted2,fontSize:11,display:"block",marginBottom:4}}>메모</label><input type="text" value={sForm.notes} onChange={e=>setSForm(p=>({...p,notes:e.target.value}))} placeholder="세트 설명" style={{...IS,width:"100%"}}/></div>
                <div>
                  <label style={{color:C.muted2,fontSize:11,display:"block",marginBottom:8}}>구성 품목 <span style={{color:C.muted,fontWeight:400}}>— 아래 품목 리스트에서 선택</span></label>
                  {sForm.components.length>0&&<div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:10}}>
                    {sForm.components.map((comp,ci)=>(
                      <div key={ci} style={{display:"flex",alignItems:"center",gap:8,background:C.bg,border:`1px solid ${C.border2}`,padding:"8px 12px",borderRadius:8}}>
                        <div style={{flex:1}}><span style={{color:C.text,fontWeight:700,fontSize:13}}>{comp.name}</span><span style={{color:C.muted2,fontSize:12,marginLeft:6}}>({comp.color})</span></div>
                        <button onClick={()=>changeQty(ci,-1)} style={{width:24,height:24,borderRadius:4,background:C.border2,color:C.text,border:"none",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>−</button>
                        <span style={{color:C.accent,fontWeight:800,fontSize:14,minWidth:22,textAlign:"center"}}>{comp.qty}</span>
                        <button onClick={()=>changeQty(ci,+1)} style={{width:24,height:24,borderRadius:4,background:C.border2,color:C.text,border:"none",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
                        <button onClick={()=>setSForm(p=>({...p,components:p.components.filter((_,i)=>i!==ci)}))} style={{background:"none",border:"none",color:C.red,cursor:"pointer",padding:2,display:"flex"}}><IcX s={14}/></button>
                      </div>
                    ))}
                  </div>}
                  <div style={{border:`1px solid ${C.border2}`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{padding:"8px 10px",background:C.bg,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{display:"flex",color:C.muted,flexShrink:0}}><IcSearch s={12}/></span>
                      <input value={compSearch} onChange={e=>setCompSearch(e.target.value)} placeholder="품목 검색..." style={{background:"none",border:"none",color:C.text,fontSize:12,outline:"none",flex:1}}/>
                    </div>
                    <div style={{maxHeight:180,overflowY:"auto"}}>
                      {items.filter(it=>{
                        if(!compSearch) return true;
                        const q=compSearch.toLowerCase();
                        return it.name.toLowerCase().includes(q)
                          || (it.barcode||"").toLowerCase().includes(q)
                          || resolveColor(it).toLowerCase().includes(q);
                      }).map(item=>{
                        const alreadyIn=sForm.components.find(c=>c.itemId===item.id);
                        const dc = resolveColor(item);
                        return (
                          <button key={item.id} onClick={()=>addComp(item)} style={{display:"flex",alignItems:"center",width:"100%",textAlign:"left",padding:"9px 12px",background:alreadyIn?C.border+"55":"transparent",border:"none",borderBottom:`1px solid ${C.border}22`,cursor:"pointer",gap:10}} onMouseEnter={e=>e.currentTarget.style.background=C.border2} onMouseLeave={e=>e.currentTarget.style.background=alreadyIn?C.border+"55":"transparent"}>
                            <div style={{flex:1}}><span style={{color:C.text,fontWeight:600,fontSize:13}}>{item.name}</span>{dc&&<span style={{color:C.muted2,fontSize:11,marginLeft:6}}>{dc}</span>}</div>
                            <span style={{color:"#93c5fd",fontSize:10,fontFamily:"monospace"}}>{item.barcode}</span>
                            <span style={{color:item.stock>0?C.green:C.red,fontSize:11,fontWeight:700,minWidth:32,textAlign:"right"}}>재고 {item.stock}</span>
                            {alreadyIn?<span style={{color:C.accent,fontSize:11,fontWeight:700,minWidth:36,textAlign:"right"}}>×{alreadyIn.qty}</span>:<span style={{display:"flex",color:C.green,flexShrink:0}}><IcPlus s={13}/></span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
              <div style={{padding:"14px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end",position:"sticky",bottom:0,background:C.card2}}>
                <button onClick={()=>{setShowSetModal(false);setEditSet(null);setCompSearch("");}} style={{padding:"8px 15px",background:C.border2,color:C.muted2,border:"none",borderRadius:6,cursor:"pointer"}}>취소</button>
                <button onClick={saveSet} style={{padding:"8px 15px",background:C.accent,color:"#000",border:"none",borderRadius:6,cursor:"pointer",fontWeight:700}}>{editSet?"수정":"추가"}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── 루트 App ───────────────────────────────────────────────────────────────
function App() {
  // RTDB가 유일한 저장소 — 초기값 빈 배열, on('value')가 채워줌
  const [deliveries,setDeliveries]=useState([]);
  const [delLoading,setDelLoading]=useState(true);
  const [items,setItems]=useState([]);
  const [sets,setSets]=useState([]);
  const [page,setPage]=useState("delivery");
  const [fontSize,setFontSize]=useState(15);
  const [fbStatus,setFbStatus]=useState("connecting");
  const [fbError,setFbError]=useState("");
  const [writeError,setWriteError]=useState("");
  const [whStatus,setWhStatus]=useState("idle");
  const [fromWarehouse,setFromWarehouse]=useState(false);
  const [stores,setStores]=useState([]);

  // 쓰기 오류 토스트 4초 후 소멸
  useEffect(()=>{
    if(!writeError) return;
    const t=setTimeout(()=>setWriteError(""),4000);
    return()=>clearTimeout(t);
  },[writeError]);

  // RTDB 쓰기 에러 래퍼
  const dbWrite=useCallback(async(fn,label="저장")=>{
    try{ return await fn(); }
    catch(e){
      console.error("RTDB 오류:",e);
      setWriteError(`${label} 실패: ${e.code||e.message||String(e)}`);
      throw e;
    }
  },[]);

  // ── RTDB 실시간 리스너 ────────────────────────────────────────────────
  useEffect(()=>{
    const DR=rtDb.ref('deliveries');
    const IR=rtDb.ref('items');
    const SR=rtDb.ref('sets');
    const STR=rtDb.ref('stores');
    const WR=rtDb.ref(`${WH_WS}/products`);

    // 연결 상태
    const CR=rtDb.ref('.info/connected');
    CR.on('value',snap=>{ if(snap.val()){setFbStatus('connected');setFbError('');} });

    // 배송
    let fd=true;
    DR.on('value',snap=>{
      const val=snap.val();
      if(!val&&fd){ fd=false;
        const u={};DELIVERIES_SEED.forEach((d,i)=>{u[DR.push().key]={...d,order:i+1};});
        DR.update(u); return;
      }
      fd=false;
      const arr=Object.entries(val||{}).map(([k,v])=>({...v,id:k})).sort((a,b)=>(a.order||0)-(b.order||0));
      setDeliveries(arr); setDelLoading(false); setFbStatus('connected');
    },err=>{ setFbStatus('error'); setFbError(err.message||String(err)); setDelLoading(false); });

    // 품목 (수동)
    let fi=true;
    IR.on('value',snap=>{
      const val=snap.val();
      if(!val&&fi){ fi=false;
        const u={};ITEMS_SEED.forEach(i=>{u[IR.push().key]=i;});
        IR.update(u); return;
      }
      fi=false;
      if(!fromWarehouse) setItems(Object.entries(val||{}).map(([k,v])=>({...v,id:k})));
    });

    // 세트
    let fs=true;
    SR.on('value',snap=>{
      const val=snap.val();
      if(!val&&fs){ fs=false;
        const u={};SETS_SEED.forEach(s=>{u[SR.push().key]=s;});
        SR.update(u); return;
      }
      fs=false;
      setSets(Object.entries(val||{}).map(([k,v])=>({...v,id:k})));
    });

    // 창고 품목
    WR.on('value',snap=>{
      const val=snap.val(); if(!val) return;
      const mapped=Object.values(val).filter(p=>p&&p.name).map(p=>({
        id:String(p.id??genId()),name:p.name||"",color:p.color||"",
        barcode:p.barcode||p.sku||"",stock:typeof p.qty==="number"?p.qty:0,fromWarehouse:true,
      }));
      setItems(mapped); setFromWarehouse(true); setWhStatus('connected');
    });

    // 구입처
    let fst=true;
    STR.on('value',snap=>{
      const val=snap.val();
      if(!val&&fst){ fst=false;
        const u={};STORES_SEED.forEach(name=>{u[STR.push().key]={name};});
        STR.update(u); return;
      }
      fst=false;
      setStores(Object.entries(val||{}).map(([k,v])=>({...v,id:k})));
    });

    return()=>{ CR.off();DR.off();IR.off();SR.off();STR.off();WR.off(); };
  },[]); // eslint-disable-line

  // ── 배송 CRUD ─────────────────────────────────────────────────────────
  const addDelivery=useCallback(async form=>{
    const maxOrd=deliveries.reduce((m,d)=>Math.max(m,d.order||0),0);
    const key=rtDb.ref('deliveries').push().key;
    setDeliveries(p=>[...p,{...form,id:key,order:maxOrd+1}]);
    await dbWrite(()=>rtDb.ref('deliveries').child(key).set({...form,order:maxOrd+1,createdAt:firebase.database.ServerValue.TIMESTAMP}),"배송 추가");
  },[deliveries,dbWrite]);

  const updateDelivery=useCallback(async(id,form)=>{
    setDeliveries(p=>p.map(d=>d.id===id?{...d,...form}:d));
    await dbWrite(()=>rtDb.ref('deliveries').child(id).update(form),"배송 수정");
  },[dbWrite]);

  const bulkDeleteDeliveries=useCallback(async ids=>{
    setDeliveries(p=>p.filter(d=>!ids.has(d.id)));
    const u={};ids.forEach(id=>{u[id]=null;});
    await dbWrite(()=>rtDb.ref('deliveries').update(u),"배송 삭제");
  },[dbWrite]);

  const reorderDeliveries=useCallback(async arr=>{
    const ri=arr.map((d,i)=>({...d,order:i+1})); setDeliveries(ri);
    const u={};ri.forEach(d=>{u[`${d.id}/order`]=d.order;});
    await dbWrite(()=>rtDb.ref('deliveries').update(u),"순서 변경");
  },[dbWrite]);

  // ── 품목 CRUD ─────────────────────────────────────────────────────────
  const addItem=useCallback(async form=>{
    const key=rtDb.ref('items').push().key;
    setItems(p=>[...p,{...form,id:key}]);
    await dbWrite(()=>rtDb.ref('items').child(key).set(form),"품목 추가");
  },[dbWrite]);
  const updateItem=useCallback(async(id,form)=>{
    setItems(p=>p.map(i=>i.id===id?{...i,...form}:i));
    await dbWrite(()=>rtDb.ref('items').child(id).update(form),"품목 수정");
  },[dbWrite]);
  const removeItem=useCallback(async id=>{
    setItems(p=>p.filter(i=>i.id!==id));
    await dbWrite(()=>rtDb.ref('items').child(id).remove(),"품목 삭제");
  },[dbWrite]);

  // ── 세트 CRUD ─────────────────────────────────────────────────────────
  const addSet=useCallback(async form=>{
    const key=rtDb.ref('sets').push().key;
    setSets(p=>[...p,{...form,id:key}]);
    await dbWrite(()=>rtDb.ref('sets').child(key).set(form),"세트 추가");
  },[dbWrite]);
  const updateSet=useCallback(async(id,form)=>{
    setSets(p=>p.map(s=>s.id===id?{...s,...form}:s));
    await dbWrite(()=>rtDb.ref('sets').child(id).update(form),"세트 수정");
  },[dbWrite]);
  const removeSet=useCallback(async id=>{
    setSets(p=>p.filter(s=>s.id!==id));
    await dbWrite(()=>rtDb.ref('sets').child(id).remove(),"세트 삭제");
  },[dbWrite]);

  // ── 구입처 CRUD ───────────────────────────────────────────────────────
  const addStore=useCallback(async name=>{
    const key=rtDb.ref('stores').push().key;
    setStores(p=>[...p,{name,id:key}]);
    await dbWrite(()=>rtDb.ref('stores').child(key).set({name}),"구입처 추가");
  },[dbWrite]);
  const removeStore=useCallback(async id=>{
    setStores(p=>p.filter(s=>s.id!==id));
    await dbWrite(()=>rtDb.ref('stores').child(id).remove(),"구입처 삭제");
  },[dbWrite]);

  const STATUS={
    connecting:{dot:C.accent,label:"연결 중..."},
    connected: {dot:C.green, label:"Firebase 연결됨"},
    error:     {dot:C.red,   label:"연결 오류"},
  };
  const st=STATUS[fbStatus]||STATUS.connecting;

  const ctx={
    deliveries,addDelivery,updateDelivery,bulkDeleteDeliveries,reorderDeliveries,delLoading,
    items,addItem,updateItem,removeItem,
    sets,addSet,updateSet,removeSet,
    stores,addStore,removeStore,
    fontSize,fbStatus,fromWarehouse,whStatus,
  };

  return (
    <AppCtx.Provider value={ctx}>
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:C.bg,fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',sans-serif",color:C.text,overflow:"hidden"}}>
        <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",height:54,background:C.card,borderBottom:`1px solid ${C.border}`,flexShrink:0,zIndex:100,gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{width:34,height:34,background:C.accent,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}><IcPkg s={18}/></div>
            <div>
              <div style={{color:C.text,fontWeight:800,fontSize:15,letterSpacing:"-0.02em",lineHeight:1.2}}>레브릭스 배송관리</div>
              <div style={{color:C.muted,fontSize:9,letterSpacing:"0.06em"}}>REBRIX DELIVERY SYSTEM</div>
            </div>
          </div>
          <nav style={{display:"flex",gap:3,background:C.bg,borderRadius:8,padding:3,border:`1px solid ${C.border}`}}>
            {[["delivery","📅 배송 일정"],["items","📦 품목 / 세트"]].map(([key,label])=>(
              <button key={key} onClick={()=>setPage(key)} style={{padding:"6px 16px",background:page===key?C.accent:"transparent",color:page===key?"#000":C.muted,border:"none",borderRadius:5,cursor:"pointer",fontWeight:page===key?700:400,fontSize:13,fontFamily:"inherit"}}>{label}</button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:fbStatus==="connected"?"#0d2a1a":fbStatus==="error"?"#3a1010":C.border2,border:`1px solid ${st.dot}44`,borderRadius:6,fontSize:12,fontWeight:600,color:st.dot}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:st.dot,display:"inline-block",animation:fbStatus==="connecting"?"pulse 1s ease-in-out infinite":"none"}}/>{st.label}
            </div>
            {whStatus==="connected"&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"#0d2a1a",border:`1px solid ${C.green}44`,borderRadius:6,fontSize:12,fontWeight:600,color:C.green}}><span style={{width:7,height:7,borderRadius:"50%",background:C.green,display:"inline-block"}}/>창고 연동됨</div>}
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{color:C.muted,fontSize:10}}>크기</span>
              <button onClick={()=>setFontSize(s=>Math.max(10,s-1))} style={{width:26,height:26,background:C.border2,color:C.text,border:`1px solid ${C.border2}`,borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcZoomO s={13}/></button>
              <span style={{color:C.accent,fontSize:11,minWidth:18,textAlign:"center",fontWeight:700,fontFamily:"monospace"}}>{fontSize}</span>
              <button onClick={()=>setFontSize(s=>Math.min(20,s+1))} style={{width:26,height:26,background:C.border2,color:C.text,border:`1px solid ${C.border2}`,borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcZoomI s={13}/></button>
            </div>
          </div>
        </header>
        <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {page==="delivery"?<DeliveryPage/>:<ItemsPage/>}
        </main>
        <div style={{height:24,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",flexShrink:0}}>
          <span style={{color:C.muted,fontSize:9,display:"flex",alignItems:"center",gap:8}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:st.dot,display:"inline-block"}}/>{fbStatus==="connected"?"🔥 Firestore 실시간 동기화":"Firebase 연결 중..."}</span>
            {whStatus==="connected"&&<span style={{color:C.green,display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:C.green,display:"inline-block"}}/>🏭 창고 재고 실시간 연동</span>}
          </span>
          <span style={{color:C.muted,fontSize:9}}>레브릭스 배송 관리 시스템 v3.0 | 행 드래그로 순서 변경</span>
        </div>

        {/* ── Firestore 쓰기 오류 토스트 ── */}
        {writeError && (
          <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#3a1010",border:`1px solid ${C.red}66`,borderRadius:10,padding:"12px 20px",color:C.red,fontSize:13,fontWeight:600,zIndex:400,display:"flex",alignItems:"center",gap:10,boxShadow:"0 8px 24px rgba(0,0,0,0.5)",whiteSpace:"nowrap"}}>
            ⚠️ {writeError}
            <button onClick={()=>setWriteError("")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:"0 2px",fontSize:16}}>✕</button>
          </div>
        )}

        {/* ── Firebase 오류 전체화면 안내 ── */}
        {fbError && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
            <div style={{background:C.card2,borderRadius:14,width:"100%",maxWidth:560,border:`2px solid ${C.red}88`,padding:28}}>
              <div style={{color:C.red,fontSize:18,fontWeight:800,marginBottom:12}}>🚫 Firebase 연결 실패</div>
              <div style={{background:"#1a0808",borderRadius:8,padding:12,fontFamily:"monospace",fontSize:11,color:"#f87171",marginBottom:20,wordBreak:"break-all",lineHeight:1.6}}>{fbError}</div>

              <div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:8}}>✅ 해결법 — RTDB 보안 규칙 확인</div>
              <div style={{color:C.muted2,fontSize:12,marginBottom:10,lineHeight:1.8}}>
                <a href="https://console.firebase.google.com/project/rebrix-warehouse/database/rebrix-warehouse-default-rtdb/rules" target="_blank" rel="noreferrer" style={{color:C.blue}}>Firebase 콘솔 → Realtime Database → 규칙</a>에서 아래 내용으로 설정하세요.
              </div>
              <pre style={{background:"#0a1a0f",borderRadius:8,padding:12,fontFamily:"monospace",fontSize:12,color:"#86efac",marginBottom:20,lineHeight:1.7,overflowX:"auto"}}>{`{
  "rules": {
    ".read": true,
    ".write": true
  }
}`}</pre>
              <div style={{display:"flex",gap:10}}>
                <a href="https://console.firebase.google.com/project/rebrix-warehouse/firestore/rules"
                   target="_blank" rel="noreferrer"
                   style={{flex:1,display:"flex",justifyContent:"center",padding:"11px 0",background:C.green,color:"#000",borderRadius:8,fontWeight:700,fontSize:14,textDecoration:"none"}}>
                  🔧 규칙 설정 바로가기
                </a>
                <button onClick={()=>window.location.reload()}
                  style={{flex:1,padding:"11px 0",background:C.border2,color:C.text,border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>
                  설정 후 새로고침
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
