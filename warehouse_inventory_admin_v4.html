<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>창고 재고관리 관리자 v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f4f0;
  --color-background-tertiary:#eeede9;
  --color-background-success:#eaf3de;
  --color-background-danger:#fcebeb;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#5f5e5a;
  --color-text-tertiary:#888780;
  --color-text-success:#27500a;
  --color-text-danger:#791f1f;
  --color-text-warning:#633806;
  --color-border-tertiary:rgba(0,0,0,0.1);
  --color-border-secondary:rgba(0,0,0,0.2);
  --color-border-primary:rgba(0,0,0,0.3);
  --color-border-success:#c0dd97;
  --color-border-danger:#f7c1c1;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a27;
    --color-background-tertiary:#323230;
    --color-background-success:#27500a;
    --color-background-danger:#791f1f;
    --color-text-primary:#e8e6de;
    --color-text-secondary:#9c9a92;
    --color-text-tertiary:#5f5e5a;
    --color-text-success:#c0dd97;
    --color-text-danger:#f09595;
    --color-text-warning:#fac775;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.2);
    --color-border-primary:rgba(255,255,255,0.3);
  }
}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);padding:1rem;max-width:700px;margin:0 auto}
.page{padding:1rem 0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.topbar h1{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.tab-row{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--color-background-secondary);padding:4px;border-radius:var(--border-radius-md)}
.tab{flex:1;padding:7px 0;text-align:center;font-size:13px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;border-radius:6px;border:none;background:transparent;transition:all .15s;font-family:var(--font-sans)}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary)}
.panel{display:none}.panel.active{display:block}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.stat-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-value.danger{color:var(--color-text-danger)}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.scanner-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:0.5px dashed var(--color-border-secondary);transition:background .15s}
.scanner-box:hover{background:var(--color-background-tertiary)}
.scanner-box p{font-size:13px;color:var(--color-text-secondary)}
.input-row{display:flex;gap:8px;margin-top:10px}
.input-row input{flex:1;font-size:14px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans)}
.input-row input:focus{border-color:var(--color-border-primary)}
button{padding:8px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:background .12s}
button:hover{background:var(--color-background-secondary)}
button:active{transform:scale(.98)}
.result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.25rem;display:none}
.result-card.visible{display:block}
.result-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.result-name{font-size:16px;font-weight:500}
.result-sku{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:1rem}
.qty-display{font-size:32px;font-weight:500;min-width:60px;text-align:center}
.qty-btn{width:44px;height:44px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-primary);transition:background .12s;font-family:var(--font-sans)}
.qty-btn:hover{background:var(--color-background-secondary)}
.action-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-success{font-size:13px;background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:8px 18px;cursor:pointer;font-weight:500;font-family:var(--font-sans)}
.btn-success:hover{opacity:.8}
.btn-danger-action{font-size:13px;background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);padding:8px 18px;cursor:pointer;font-weight:500;font-family:var(--font-sans)}
.btn-danger-action:hover{opacity:.8}
.btn-ghost{font-size:13px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 16px;cursor:pointer;background:transparent;font-family:var(--font-sans)}
.btn-ghost:hover{background:var(--color-background-secondary)}
.toast{padding:10px 14px;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:1rem;display:none}
.toast.success{background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);display:block}
.toast.danger{background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);display:block}
.items-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.items-filter{display:flex;gap:6px}
.filter-pill{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .12s;font-family:var(--font-sans)}
.filter-pill.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.item-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;cursor:pointer;border:0.5px solid transparent;transition:all .15s;position:relative}
.item-card:hover{background:var(--color-background-tertiary);border-color:var(--color-border-secondary)}
.item-card.status-low{border-left:2px solid #EF9F27}
.item-card.status-out{border-left:2px solid #E24B4A}
.item-card-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-card-qty{font-size:24px;font-weight:500;color:var(--color-text-primary);line-height:1;margin-bottom:4px}
.item-card-qty.out{color:var(--color-text-danger)}
.item-card-qty.low{color:var(--color-text-warning)}
.item-card-unit{font-size:11px;color:var(--color-text-tertiary)}
.item-card-sku{font-size:10px;color:var(--color-text-tertiary);margin-top:6px}
.item-badge{position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%}
.item-badge.ok{background:#639922}.item-badge.low{background:#EF9F27}.item-badge.out{background:#E24B4A}
.log-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.log-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary);padding:6px 10px;border-radius:var(--border-radius-md);background:var(--color-background-secondary)}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-dot.in{background:#639922}.log-dot.out{background:#E24B4A}.log-dot.edit{background:#378ADD}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);font-size:12px;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:9px 10px;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-block;padding:3px 8px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500}
.badge-ok{background:#EAF3DE;color:#27500A}
.badge-low{background:#FAEEDA;color:#633806}
.badge-out{background:#FCEBEB;color:#791F1F}
.product-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.product-toolbar input{flex:1;font-size:14px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans)}
.product-toolbar input:focus{border-color:var(--color-border-primary)}
.btn-primary{font-size:13px;font-weight:500;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);padding:8px 16px;cursor:pointer;white-space:nowrap;transition:opacity .15s;font-family:var(--font-sans)}
.btn-primary:hover{opacity:.75}
.icon-btn{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--color-text-secondary);transition:background .12s;margin:0 2px}
.icon-btn:hover{background:var(--color-background-secondary)}
.icon-btn.del:hover{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px;display:block}
.form-input{width:100%;font-size:14px;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;transition:border-color .12s;font-family:var(--font-sans)}
.form-input:focus{border-color:var(--color-border-primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.form-error{font-size:12px;color:var(--color-text-danger);margin-top:4px;display:none}
.form-error.show{display:block}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;z-index:100;padding:1rem}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.5rem;width:100%;max-width:360px;text-align:center}
.confirm-box p{font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;line-height:1.6}
</style>
</head>
<body>
<div class="page">

<div class="topbar">
  <h1>재고 관리</h1>
  <span style="font-size:12px;color:var(--color-text-tertiary)">방금 업데이트</span>
</div>

<div class="tab-row">
  <button class="tab active" onclick="switchTab('main')">메인</button>
  <button class="tab" onclick="switchTab('products')">품목 관리</button>
</div>

<div id="toast" class="toast"></div>

<!-- 메인 탭 -->
<div class="panel active" id="panel-main">

  <div class="card">
    <div class="section-title">바코드 스캔</div>
    <div class="scanner-box" onclick="startScan()">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect x="2" y="8" width="3" height="24" rx="1" fill="var(--color-text-secondary)"/>
        <rect x="7" y="8" width="1.5" height="24" rx="0.5" fill="var(--color-text-secondary)"/>
        <rect x="10.5" y="8" width="3" height="24" rx="1" fill="var(--color-text-secondary)"/>
        <rect x="15.5" y="8" width="1.5" height="24" rx="0.5" fill="var(--color-text-secondary)"/>
        <rect x="19" y="8" width="2.5" height="24" rx="1" fill="var(--color-text-secondary)"/>
        <rect x="23.5" y="8" width="1.5" height="24" rx="0.5" fill="var(--color-text-secondary)"/>
        <rect x="27" y="8" width="3" height="24" rx="1" fill="var(--color-text-secondary)"/>
        <rect x="32" y="8" width="1.5" height="24" rx="0.5" fill="var(--color-text-secondary)"/>
        <rect x="35.5" y="8" width="2.5" height="24" rx="1" fill="var(--color-text-secondary)"/>
        <line x1="2" y1="20" x2="38" y2="20" stroke="var(--color-text-danger)" stroke-width="1.5" stroke-dasharray="3 2"/>
      </svg>
      <p>카메라로 바코드 스캔</p>
      <p style="font-size:11px;color:var(--color-text-tertiary)">탭하여 카메라 열기</p>
    </div>
    <div class="input-row">
      <input type="text" id="barcode-input" placeholder="바코드 번호 직접 입력..." onkeydown="if(event.key==='Enter')lookupBarcode()"/>
      <button onclick="lookupBarcode()">조회</button>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <div><div class="result-name" id="r-name"></div><div class="result-sku" id="r-sku"></div></div>
      <div class="badge" id="r-badge"></div>
    </div>
    <div class="qty-row">
      <button class="qty-btn" onclick="adjustDelta(-1)">−</button>
      <div class="qty-display" id="r-qty">0</div>
      <button class="qty-btn" onclick="adjustDelta(1)">+</button>
      <span style="font-size:13px;color:var(--color-text-secondary)">개&nbsp;(변경량:&nbsp;<span id="r-delta" style="font-weight:500;color:var(--color-text-primary)">0</span>)</span>
    </div>
    <div class="action-row">
      <button class="btn-success" onclick="commit('in')">입고 확정</button>
      <button class="btn-danger-action" onclick="commit('out')">출고 확정</button>
      <button class="btn-ghost" onclick="cancelResult()">취소</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">전체 품목</div><div class="stat-value" id="stat-total">0</div></div>
    <div class="stat"><div class="stat-label">전체 수량</div><div class="stat-value" id="stat-qty">0</div></div>
    <div class="stat"><div class="stat-label">재고 부족</div><div class="stat-value danger" id="stat-low">0</div></div>
  </div>

  <div class="card">
    <div class="items-header">
      <div class="section-title" style="margin-bottom:0">품목별 재고</div>
      <div class="items-filter">
        <button class="filter-pill active" onclick="setFilter('all',this)">전체</button>
        <button class="filter-pill" onclick="setFilter('low',this)">부족</button>
        <button class="filter-pill" onclick="setFilter('out',this)">소진</button>
      </div>
    </div>
    <div style="margin-top:10px;margin-bottom:10px">
      <input type="text" id="main-search" placeholder="품목 검색..." style="width:100%;font-size:13px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans)" oninput="renderItemGrid()"/>
    </div>
    <div class="item-grid" id="item-grid"></div>
  </div>

  <div class="card">
    <div class="section-title">최근 입출고 이력</div>
    <div class="log-list" id="log-list-main"></div>
  </div>
</div>

<!-- 품목 관리 탭 -->
<div class="panel" id="panel-products">
  <div class="card" style="margin-bottom:1.25rem">
    <div class="product-toolbar">
      <input type="text" id="pm-search" placeholder="품목명 또는 SKU 검색..." oninput="renderProductTable()"/>
      <button class="btn-primary" onclick="openAddModal()">+ 품목 추가</button>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th style="width:24%">품목명</th>
          <th style="width:14%">SKU</th>
          <th style="width:18%">바코드</th>
          <th style="width:10%;text-align:right">수량</th>
          <th style="width:10%;text-align:right">기준</th>
          <th style="width:10%">단위</th>
          <th style="width:14%;text-align:center">조작</th>
        </tr></thead>
        <tbody id="pm-body"></tbody>
      </table>
    </div>
  </div>
</div>

</div>

<!-- 모달 (position:fixed — standalone HTML 전용) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">품목 추가</div>
    <div class="form-group">
      <label class="form-label">품목명 *</label>
      <input class="form-input" id="f-name" placeholder="예) A4 복사용지" oninput="clearErr('err-name')"/>
      <div class="form-error" id="err-name">품목명을 입력해주세요.</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">SKU *</label>
        <input class="form-input" id="f-sku" placeholder="예) PPR-001" oninput="clearErr('err-sku')"/>
        <div class="form-error" id="err-sku">SKU를 입력해주세요.</div>
      </div>
      <div class="form-group">
        <label class="form-label">바코드</label>
        <input class="form-input" id="f-barcode" placeholder="예) 8801234560001"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">초기 수량 *</label>
        <input class="form-input" id="f-qty" type="number" min="0" placeholder="0" oninput="clearErr('err-qty')"/>
        <div class="form-error" id="err-qty">수량을 입력해주세요.</div>
      </div>
      <div class="form-group">
        <label class="form-label">재주문 기준점</label>
        <input class="form-input" id="f-reorder" type="number" min="0" placeholder="0"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">단위</label>
        <input class="form-input" id="f-unit" placeholder="예) 개, 박스, 롤"/>
      </div>
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <input class="form-input" id="f-category" placeholder="예) 사무용품"/>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveProduct()">저장</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg"></p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-ghost" onclick="closeConfirm()">취소</button>
      <button class="btn-danger-action" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleCameraCapture(event)"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
let products=[
  {id:1,name:'A4 복사용지',sku:'PPR-001',barcode:'8801234560001',qty:120,reorder:50,unit:'박스',category:'사무용품'},
  {id:2,name:'볼펜 (흑색)',sku:'PEN-002',barcode:'8801234560002',qty:15,reorder:30,unit:'자루',category:'사무용품'},
  {id:3,name:'스테이플러',sku:'STP-003',barcode:'8801234560003',qty:8,reorder:5,unit:'개',category:'사무용품'},
  {id:4,name:'박스 테이프',sku:'TPE-004',barcode:'8801234560004',qty:42,reorder:20,unit:'롤',category:'포장재'},
  {id:5,name:'안전모',sku:'HLM-005',barcode:'8801234560005',qty:0,reorder:10,unit:'개',category:'안전용품'},
  {id:6,name:'장갑 (소)',sku:'GLV-006',barcode:'8801234560006',qty:88,reorder:40,unit:'켤레',category:'안전용품'},
  {id:7,name:'마스크',sku:'MSK-007',barcode:'8801234560007',qty:200,reorder:100,unit:'개',category:'안전용품'},
  {id:8,name:'충전 케이블',sku:'CBL-008',barcode:'8801234560008',qty:7,reorder:15,unit:'개',category:'전자기기'},
];
let nextId=9;
let logs=[
  {type:'in',name:'A4 복사용지',qty:50,time:'09:12'},
  {type:'out',name:'볼펜 (흑색)',qty:5,time:'08:45'},
  {type:'out',name:'안전모',qty:3,time:'어제'},
];
let activeProduct=null,delta=0,editingId=null,deletingId=null,activeFilter='all';

function getStatus(p){return p.qty===0?'out':p.qty<p.reorder?'low':'ok'}
function badgeClass(s){return s==='ok'?'badge-ok':s==='low'?'badge-low':'badge-out'}
function badgeLabel(s){return s==='ok'?'정상':s==='low'?'재고 부족':'소진'}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['main','products'][i]===t));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='main'){renderItemGrid();renderLogs();}
  if(t==='products')renderProductTable();
}

function updateStats(){
  const total=products.reduce((a,p)=>a+p.qty,0);
  const low=products.filter(p=>getStatus(p)!=='ok').length;
  document.getElementById('stat-total').textContent=products.length;
  document.getElementById('stat-qty').textContent=total.toLocaleString();
  document.getElementById('stat-low').textContent=low;
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderItemGrid();
}

function renderItemGrid(){
  const q=(document.getElementById('main-search').value||'').toLowerCase();
  const grid=document.getElementById('item-grid');
  let filtered=products.filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q));
  if(activeFilter==='low')filtered=filtered.filter(p=>getStatus(p)==='low');
  if(activeFilter==='out')filtered=filtered.filter(p=>getStatus(p)==='out');
  if(!filtered.length){
    grid.innerHTML=`<div style="grid-column:1/-1;padding:24px 0;text-align:center;font-size:13px;color:var(--color-text-tertiary)">해당하는 품목이 없습니다</div>`;
    return;
  }
  grid.innerHTML=filtered.map(p=>{
    const s=getStatus(p);
    const qc=s==='out'?'out':s==='low'?'low':'';
    return`<div class="item-card status-${s}" onclick="selectItemCard(${p.id})">
      <div class="item-badge ${s}"></div>
      <div class="item-card-name" title="${p.name}">${p.name}</div>
      <div class="item-card-qty ${qc}">${p.qty.toLocaleString()}</div>
      <div class="item-card-unit">${p.unit||'개'}</div>
      <div class="item-card-sku">${p.sku}</div>
    </div>`;
  }).join('');
}

function selectItemCard(id){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  showResult(p);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderLogs(){
  const el=document.getElementById('log-list-main');
  if(!el)return;
  el.innerHTML=logs.slice(0,6).map(l=>`
    <div class="log-item">
      <div class="log-dot ${l.type==='edit'?'edit':l.type}"></div>
      <span style="color:var(--color-text-primary)">${l.name}</span>
      <span>${l.type==='in'?'입고':l.type==='out'?'출고':'수정'} ${l.qty}개</span>
      <span style="margin-left:auto">${l.time}</span>
    </div>`).join('');
}

function renderProductTable(){
  const q=(document.getElementById('pm-search').value||'').toLowerCase();
  document.getElementById('pm-body').innerHTML=products
    .filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q))
    .map(p=>`<tr>
      <td style="font-weight:500">${p.name}</td>
      <td style="font-size:12px;color:var(--color-text-secondary)">${p.sku}</td>
      <td style="font-size:11px;color:var(--color-text-tertiary)">${p.barcode||'—'}</td>
      <td style="text-align:right">${p.qty.toLocaleString()}</td>
      <td style="text-align:right;color:var(--color-text-secondary)">${p.reorder}</td>
      <td style="font-size:12px;color:var(--color-text-secondary)">${p.unit||'—'}</td>
      <td style="text-align:center">
        <button class="icon-btn" onclick="openEditModal(${p.id})">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <button class="icon-btn del" onclick="askDelete(${p.id})">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
      </td>
    </tr>`).join('');
}

function showResult(p){
  activeProduct=p;delta=0;
  document.getElementById('r-name').textContent=p.name;
  document.getElementById('r-sku').textContent=`${p.sku} · ${p.barcode||'바코드 없음'}`;
  const s=getStatus(p);
  const badge=document.getElementById('r-badge');
  badge.textContent=badgeLabel(s);badge.className='badge '+badgeClass(s);
  document.getElementById('r-qty').textContent=p.qty;
  document.getElementById('r-delta').textContent=0;
  document.getElementById('result-card').classList.add('visible');
}
function adjustDelta(d){
  if(!activeProduct)return;
  if(activeProduct.qty+delta+d<0)return;
  delta+=d;
  document.getElementById('r-qty').textContent=activeProduct.qty+delta;
  document.getElementById('r-delta').textContent=delta>0?'+'+delta:delta;
}
function commit(type){
  if(!activeProduct||delta===0){showToast('변경량이 0입니다.','danger');return;}
  if(type==='out'&&delta>0)delta=-delta;
  if(type==='in'&&delta<0)delta=-delta;
  const finalQty=activeProduct.qty+delta;
  if(finalQty<0){showToast('재고가 부족합니다.','danger');return;}
  activeProduct.qty=finalQty;
  logs.unshift({type,name:activeProduct.name,qty:Math.abs(delta),time:'방금'});
  showToast(`${activeProduct.name} ${type==='in'?'입고':'출고'} ${Math.abs(delta)}개 완료`,'success');
  cancelResult();updateStats();renderItemGrid();renderLogs();
}
function cancelResult(){
  activeProduct=null;delta=0;
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('barcode-input').value='';
}
function lookupBarcode(){
  const val=document.getElementById('barcode-input').value.trim();if(!val)return;
  const p=products.find(x=>x.barcode===val||x.sku.toLowerCase()===val.toLowerCase());
  if(p){showResult(p);}else{showToast('해당 바코드를 찾을 수 없습니다.','danger');}
}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type;
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.className='toast'},2800);
}
function openAddModal(){
  editingId=null;
  document.getElementById('modal-title').textContent='품목 추가';
  ['f-name','f-sku','f-barcode','f-qty','f-reorder','f-unit','f-category'].forEach(id=>document.getElementById(id).value='');
  ['err-name','err-sku','err-qty'].forEach(id=>document.getElementById(id).classList.remove('show'));
  document.getElementById('err-sku').textContent='SKU를 입력해주세요.';
  document.getElementById('modal-overlay').classList.add('open');
}
function openEditModal(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  editingId=id;
  document.getElementById('modal-title').textContent='품목 수정';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-sku').value=p.sku;
  document.getElementById('f-barcode').value=p.barcode||'';
  document.getElementById('f-qty').value=p.qty;
  document.getElementById('f-reorder').value=p.reorder;
  document.getElementById('f-unit').value=p.unit||'';
  document.getElementById('f-category').value=p.category||'';
  ['err-name','err-sku','err-qty'].forEach(id=>document.getElementById(id).classList.remove('show'));
  document.getElementById('err-sku').textContent='SKU를 입력해주세요.';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function clearErr(id){document.getElementById(id).classList.remove('show')}
function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  const sku=document.getElementById('f-sku').value.trim();
  const qty=parseInt(document.getElementById('f-qty').value);
  let valid=true;
  if(!name){document.getElementById('err-name').classList.add('show');valid=false;}
  if(!sku){document.getElementById('err-sku').classList.add('show');valid=false;}
  if(isNaN(qty)||qty<0){document.getElementById('err-qty').classList.add('show');valid=false;}
  if(!valid)return;
  const dupSku=products.find(p=>p.sku===sku&&p.id!==editingId);
  if(dupSku){document.getElementById('err-sku').textContent='이미 존재하는 SKU입니다.';document.getElementById('err-sku').classList.add('show');return;}
  const data={name,sku,barcode:document.getElementById('f-barcode').value.trim(),qty,reorder:parseInt(document.getElementById('f-reorder').value)||0,unit:document.getElementById('f-unit').value.trim(),category:document.getElementById('f-category').value.trim()};
  if(editingId){
    const idx=products.findIndex(p=>p.id===editingId);
    products[idx]={...products[idx],...data};
    logs.unshift({type:'edit',name:data.name,qty:data.qty,time:'방금'});
    showToast(`${data.name} 수정 완료`,'success');
  }else{
    products.push({id:nextId++,...data});
    logs.unshift({type:'in',name:data.name,qty:data.qty,time:'방금'});
    showToast(`${data.name} 추가 완료`,'success');
  }
  closeModal();updateStats();renderItemGrid();renderProductTable();renderLogs();
}
function askDelete(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  deletingId=id;
  document.getElementById('confirm-msg').innerHTML=`<strong>${p.name}</strong> 품목을 삭제하시겠습니까?<br>이 작업은 되돌릴 수 없습니다.`;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');deletingId=null;}
function confirmDelete(){
  if(!deletingId)return;
  const p=products.find(x=>x.id===deletingId);
  products=products.filter(x=>x.id!==deletingId);
  if(p)showToast(`${p.name} 삭제 완료`,'success');
  closeConfirm();updateStats();renderItemGrid();renderProductTable();
}
function startScan(){document.getElementById('camera-input').click();}
function handleCameraCapture(e){
  const file=e.target.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  if(typeof Quagga!=='undefined'){
    Quagga.decodeSingle({decoder:{readers:['ean_reader','code_128_reader','upc_reader','code_39_reader']},locate:true,src:url},result=>{
      URL.revokeObjectURL(url);e.target.value='';
      if(result&&result.codeResult){document.getElementById('barcode-input').value=result.codeResult.code;lookupBarcode();}
      else{showToast('바코드를 인식하지 못했습니다. 직접 입력해주세요.','danger');}
    });
  }else{showToast('직접 입력을 이용해주세요.','danger');}
}

updateStats();renderItemGrid();renderLogs();
</script>
</body>
</html>
